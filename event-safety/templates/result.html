<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Safety Analysis</title>
  <style>
    body { font-family: Arial, sans-serif; background: linear-gradient(to right, #00CFFF, #0066FF); display:flex; justify-content:center; align-items:center; height:100vh; margin:0; color:white; }
    .container { background:#001F3F; padding:30px; border-radius:12px; width:500px; text-align:left; }
    h2 { text-align:center; margin-bottom:15px; }
    form { margin-top:20px; }
    input[type="text"] { width:100%; padding:10px; border-radius:8px; margin-bottom:10px; border:none; }
    button { background:#00CFFF; color:#fff; border:none; padding:10px 15px; border-radius:8px; cursor:pointer; }
    button:hover { background:#007ACC; }
    .result { background:#003366; padding:15px; border-radius:8px; white-space:pre-wrap; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Analysis Result</h2>
    <div class="result">{{ result }}</div>

    <form action="/chat" method="post">
      <input type="text" name="question" placeholder="Ask follow-up question..." required>
      <button type="submit">Ask AI</button>
    </form>
  </div>
</body>
</html>
